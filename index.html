<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Swananda — Spray-dried functional mocktail premix powders for Hotels, Restaurants and Cafés. Zero sugar, zero alcohol, ready in 60 seconds.">
  <title>Swananda — Craft Mocktail Premix Powders</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">

  <!-- Styles (order matters) -->
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>

<body>

  <!-- All sections are injected here by render.js -->
  <div id="app"></div>

  <!-- Netlify form detection — do not remove -->
  <form name="inquiry" data-netlify="true" hidden>
    <input type="text" name="f-name">
    <input type="text" name="f-business">
    <input type="tel" name="f-phone">
    <input type="email" name="f-email">
    <select name="f-estab"></select>
    <input type="text" name="f-city">
    <input type="text" name="flavours">
    <select name="f-volume"></select>
    <textarea name="f-message"></textarea>
  </form>

  <!-- Content (must load before render.js) -->
  <script src="content/site.js"></script>

  <!-- Logic -->
  <script src="assets/js/render.js"></script>
  <script src="assets/js/carousel.js"></script>
  <script src="assets/js/offerings.js"></script>
  <script src="assets/js/form.js"></script>

</body>

</html>
